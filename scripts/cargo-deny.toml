# MoePlay Cargo supply-chain policy. Keep this file intentionally small and review every allow/ignore entry.

[graph]
targets = ["x86_64-pc-windows-msvc"]
all-features = true

[advisories]
unmaintained = "workspace"
unsound = "workspace"
yanked = "deny"
maximum-db-staleness = "P7D"
unused-ignored-advisory = "deny"
ignore = []

[licenses]
confidence-threshold = 0.8
allow = [
  "0BSD",
  "Apache-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "CC0-1.0",
  "CDLA-Permissive-2.0",
  "ISC",
  "MIT",
  "MIT-0",
  "MPL-2.0",
  "Unicode-3.0",
  "Unlicense",
  "Zlib",
]

[licenses.private]
ignore = true
