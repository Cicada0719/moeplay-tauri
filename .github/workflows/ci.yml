name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  quality-gate:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install frontend dependencies
        run: npm ci

      - name: Rust format
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Rust clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Svelte check
        run: npm run check

      - name: Frontend unit tests
        run: npm run test:unit

      - name: Frontend build
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Frontend visual smoke
        run: npm run test:visual

      - name: Upload visual smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-visual-smoke
          path: test-results/
          if-no-files-found: ignore

      - name: Tauri build smoke
        if: github.event_name == 'push'
        run: npm run tauri -- build --config src-tauri/tauri.ci.conf.json --ci

      - name: Portable package
        if: github.event_name == 'push'
        run: npm run package:portable

      - name: Release artifact self-check
        if: github.event_name == 'push'
        run: npm run verify:artifacts

      - name: Upload release artifacts
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: moeplay-windows-artifacts
          path: |
            src-tauri/target/release/moeplay.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/portable/*.zip
            src-tauri/target/release/bundle/release-manifest.json
