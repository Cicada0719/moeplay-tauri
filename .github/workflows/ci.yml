name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  quality-gate:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache pinned Cargo supply-chain tool
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-deny.exe
          key: ${{ runner.os }}-cargo-deny-${{ hashFiles('scripts/cargo-supply-chain-policy.json') }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Audit npm dependencies
        run: npm run audit:dependencies

      - name: Test Cargo supply-chain gate
        run: npm run test:cargo-supply-chain

      - name: Audit Cargo advisories and licenses
        run: npm run audit:cargo

      - name: Verify version consistency
        run: npm run verify:versions

      - name: Verify Tauri command contract
        run: npm run verify:commands

      - name: Test command contract verifier
        run: npm run test:command-contract

      - name: Test release evidence generators
        run: npm run test:release-evidence

      - name: Test updater artifact verifier
        run: node --test scripts/verify-updater-artifacts.node-test.mjs

      - name: Test mandatory automatic-update release policy
        run: npm run test:updater-policy

      - name: Test updater manifest generator
        run: npm run test:updater-manifest

      - name: Verify ordinary workspace updater state
        run: node scripts/verify-updater-artifacts.mjs --expect-absent

      - name: Test installed-upgrade report verifier
        run: npm run test:upgrade-report

      - name: Rust format
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Rust clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --all-features -- -D warnings

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --all-targets --all-features

      - name: Svelte check
        run: npm run check

      - name: Frontend unit tests
        run: npm run test:unit

      - name: Frontend build
        run: npm run build

      - name: Test bundle budget verifier
        run: npm run test:bundle-budget

      - name: Verify frontend bundle budget
        run: npm run verify:bundle-budget

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Frontend visual smoke
        run: npm run test:visual -- --ignore-snapshots

      - name: Upload visual smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-visual-smoke
          path: test-results/
          if-no-files-found: ignore

      - name: Tauri debug build smoke
        run: npm run tauri -- build --debug --no-bundle --config src-tauri/tauri.ci.conf.json --ci

      - name: Tauri release bundle build
        if: github.event_name == 'push'
        run: npm run tauri -- build --config src-tauri/tauri.ci.conf.json --ci

      - name: Portable package
        if: github.event_name == 'push'
        run: npm run package:portable

      - name: Generate release SBOM
        if: github.event_name == 'push'
        run: npm run generate:sbom

      - name: Generate build metadata
        if: github.event_name == 'push'
        run: npm run generate:build-metadata

      - name: Release artifact self-check
        if: github.event_name == 'push'
        env:
          UPDATER_RELEASE_MODE: Disabled
        run: npm run verify:artifacts

      - name: Upload release artifacts
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: moeplay-windows-artifacts
          path: |
            src-tauri/target/release/moeplay.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/portable/*.zip
            src-tauri/target/release/bundle/release-manifest.json
            src-tauri/target/release/bundle/sbom.cdx.json
            src-tauri/target/release/bundle/build-metadata.json


  android-debug:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0" "ndk;28.0.13004108"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/28.0.13004108" >> "$GITHUB_ENV"
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/28.0.13004108" >> "$GITHUB_ENV"

      - name: Setup Rust Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
          components: rustfmt

      - name: Install frontend dependencies
        run: npm ci

      - name: Svelte check
        run: npm run check

      - name: Frontend unit tests
        run: npm run test:unit

      - name: Verify Tauri command contract
        run: npm run verify:commands

      - name: Initialize Android project when absent
        shell: bash
        run: |
          if [ ! -f src-tauri/gen/android/gradlew ]; then
            npm run tauri -- android init --ci --skip-targets-install
          fi

      - name: Build Android debug APK
        run: npm run tauri -- android build --debug --apk --target aarch64 --ci

      - name: Upload Android debug APK
        uses: actions/upload-artifact@v4
        with:
          name: moeplay-android-debug
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
