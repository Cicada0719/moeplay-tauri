name: Nightly performance

on:
  workflow_dispatch:
  schedule:
    - cron: "17 18 * * *"

concurrency:
  group: nightly-performance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-10k-library:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      - name: Run 10k SQLite performance gate
        run: cargo test --manifest-path src-tauri/Cargo.toml --release benchmark_10000_games_nightly -- --ignored --nocapture
